<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>Come With Me Take The Journey</title>

<style>
#page {
    width: 928px;
    height: 1624px;
    margin: 24px auto;
    background: gray;
    border-radius: 24px;
    border: 1px solid gray;

    position: relative;
    overflow: hidden;
} h1 {
    font: 48pt/1.4em Arial, sans-serif;
    color: aqua;
    text-shadow: 2px 3px 6px hotpink;
    text-align: center;
} p {
    font: 14pt/1.4em Georgia;
    width: 768px;
    margin: 24px auto;
    color: whitesmoke;
} #landscape {
    position: absolute;
    top: 420px;   
    left: 0;
    width: 928px;
    height: 510px;
    z-index: 1;
} .sticker {
    position: absolute;
    width: 200px;
    height: 200px;
    z-index: 2;
    cursor: grab;
    user-select: none;
} #buttons {
    width: 500px;
    margin: 48px auto 0 auto;
    display: flex;
    justify-content: space-evenly;
    align-items: flex-end;
    position: relative;
    z-index: 3;
} @media print {

    body {
        margin: 0;
    } #page {
        margin: 0;
    }

    @page {
        size: 928px 1624px;
        margin: 0;
    } #buttons {
        display: none;
    }
}

</style>
</head>

<body>

<div id="page">

    <h1>March 7th's Album</h1>

    <p>The meaning of Trailblaze is to "explore, understand, establish, and connect."</p>

    <p><i>March 7th:</i> A camera can only capture fleeting moments...</p>

    <p>Drag the images to create your own story</p>

    <img src="Belobog.jpg" id="landscape">

    <img src="1.png" class="sticker" draggable="true" style="top: 980px; left: 40px;">
    <img src="2.png" class="sticker" draggable="true" style="top: 980px; left: 260px;">
    <img src="3.png" class="sticker" draggable="true" style="top: 980px; left: 480px;">
    <img src="4.png" class="sticker" draggable="true" style="top: 980px; left: 700px;">

    <img src="5.png" class="sticker" draggable="true" style="top: 1200px; left: 40px;">
    <img src="6.png" class="sticker" draggable="true" style="top: 1200px; left: 260px;">
    <img src="7.png" class="sticker" draggable="true" style="top: 1200px; left: 480px;">
    <img src="8.png" class="sticker" draggable="true" style="top: 1200px; left: 700px;">

    <div id="buttons">
        <figure>
            <img onclick="window.print()" src="Camera.png" height="110" width="110">
            <figcaption>Record This Memory</figcaption>
        </figure>
    </div>

</div>

<script>
    
let current = null;
let offsetX = 0;
let offsetY = 0;

document.querySelectorAll(".sticker").forEach(img => {

    img.addEventListener("dragstart", (e) => {
        current = img;

        const rect = img.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
    });

});

document.addEventListener("dragover", (e) => {
    e.preventDefault();
});

document.addEventListener("drop", (e) => {
    e.preventDefault();

    if (!current) return;

    const page = document.getElementById("page");
    const rect = page.getBoundingClientRect();

    const x = e.clientX - rect.left - offsetX;
    const y = e.clientY - rect.top - offsetY;

    current.style.left = x + "px";
    current.style.top = y + "px";
});

</script>

</body>
</html>
